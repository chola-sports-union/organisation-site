<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Standard SEO ── -->
    <title>Chola FC | Excellence in Sports</title>
    <meta
      name="description"
      content="Chola FC is a premier football academy offering professional football training, youth development programs, and elite coaching."
    />
    <link rel="canonical" href="https://www.cholafc.com/" />
    <meta name="robots" content="index, follow" />

    <!-- ── Open Graph ── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Chola FC" />
    <meta property="og:url" content="https://www.cholafc.com/" />
    <meta property="og:title" content="Chola FC | Excellence in Sports" />
    <meta
      property="og:description"
      content="Chola FC is a premier football academy offering professional football training, youth development programs, and elite coaching."
    />
    <meta property="og:image" content="https://www.cholafc.com/logo.png" />
    <meta property="og:image:alt" content="Chola FC Logo" />
    <meta property="og:locale" content="en_IN" />

    <!-- ── Twitter / X Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Chola FC | Excellence in Sports" />
    <meta
      name="twitter:description"
      content="Chola FC is a premier football academy offering professional football training, youth development programs, and elite coaching."
    />
    <meta name="twitter:image" content="https://www.cholafc.com/logo.png" />

    <!-- ── JSON-LD Structured Data (static fallback for Googlebot) ── -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SportsOrganization",
        "name": "Chola FC",
        "url": "https://www.cholafc.com",
        "logo": "https://www.cholafc.com/logo.png",
        "description": "Chola FC is a premier football academy in Chennai offering professional football training, youth development programs, and elite coaching.",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Chennai",
          "addressRegion": "Tamil Nadu",
          "addressCountry": "IN"
        },
        "sport": "Football"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
